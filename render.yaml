services:
  - type: web
    name: team-galaxy-app
    env: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: galaxy-db
          property: connectionString
      - key: ADMIN_USER
        sync: false
      - key: ADMIN_PASS
        sync: false
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: galaxy-db
    plan: free